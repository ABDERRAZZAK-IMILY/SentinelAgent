@if (vm$ | async; as vm) {
  <section class="grid gap-6 xl:grid-cols-12">
    <app-overview-control-panel class="block min-w-0 xl:col-span-3" [quickLinks]="quickLinks" />
    <app-overview-fleet-panel
      class="block min-w-0 xl:col-span-6"
      [loading]="vm.loading"
      [unitSummary]="vm.unitSummary"
      [performance]="vm.performance" />
    <app-overview-activity-panel class="block min-w-0 xl:col-span-3" [loading]="vm.loading" [logs]="vm.logs" />
  </section>
}

<app-footer leftText="Sentinel Intelligence Systems © 2026" rightText="Build 88-Alpha" />
